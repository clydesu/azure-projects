<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Receipt Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #0066cc;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .upload-form {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
            background: #f5f5f5;
        }
        input[type="file"] {
            margin: 10px 0;
            padding: 8px;
            width: 100%;
        }
        button {
            background: #0066cc;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #0052a3;
        }
        .loading {
            color: #666;
            font-style: italic;
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        .results {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
            background: #f9f9f9;
            display: none;
        }
        .result-row {
            margin: 10px 0;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        .result-row:last-child {
            border-bottom: none;
        }
        .result-label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Back to Portfolio</a>
    
    <div class="container">
        <h1>Smart Receipt Tracker</h1>
        <p>Upload a receipt image and extract key information using Azure AI</p>
        
        <div class="upload-form">
            <h3>Upload Receipt</h3>
            <form id="receiptForm" enctype="multipart/form-data">
                <input type="file" id="receiptFile" name="receipt" accept="image/*,.pdf" required>
                <br>
                <button type="submit">Process Receipt</button>
            </form>
            
            <div id="loading" class="loading">
                Processing receipt... Please wait.
            </div>
        </div>
    </div>

    <div id="results" class="container results">
        <h3>Extracted Information</h3>
        <div id="extractedData"></div>
    </div>

    <script>
        document.getElementById('receiptForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('receiptFile');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            if (!fileInput.files[0]) {
                alert('Please select a receipt file');
                return;
            }
            
            loading.style.display = 'block';
            results.style.display = 'none';
            
            const formData = new FormData();
            formData.append('receipt', fileInput.files[0]);
            
            try {
                const response = await fetch('/upload-receipt', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showResults(result);
                    results.style.display = 'block';
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        });
        
        function showResults(data) {
            const container = document.getElementById('extractedData');
            container.innerHTML = '';
            
            if (data.merchant_name) {
                container.innerHTML += `<div class="result-row"><span class="result-label">Merchant:</span> ${data.merchant_name}</div>`;
            }
            if (data.total) {
                container.innerHTML += `<div class="result-row"><span class="result-label">Total:</span> ${data.total}</div>`;
            }
            if (data.date) {
                container.innerHTML += `<div class="result-row"><span class="result-label">Date:</span> ${data.date}</div>`;
            }
            if (data.items && data.items.length > 0) {
                container.innerHTML += `<div class="result-row"><span class="result-label">Items:</span> ${data.items.join(', ')}</div>`;
            }
            if (data.processed_at) {
                container.innerHTML += `<div class="result-row"><span class="result-label">Processed:</span> ${new Date(data.processed_at).toLocaleString()}</div>`;
            }
        }
    </script>
</body>
</html>
